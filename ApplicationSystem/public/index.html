<!-- Nodevision/ApplicationSystem/public/index.html -->
<!-- This file defines an HTML page used by the Nodevision browser client. It structures the UI and loads supporting scripts and styles. -->
<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nodevision</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="MainStyles.css">
  <link rel="stylesheet" href="LayoutStyles.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="GraphStyles.css">
  <link rel="stylesheet" href="ToolbarStyles.css">
  <link rel="stylesheet" href="StatusBarStyles.css">
  <link rel="stylesheet" href="NodeViewContainerStyles.css">

  <!--User Preference Styles-->
  <link rel="stylesheet" href='../UserSettings/UserStyles.css'>

  <!-- Cytoscape + Extensions (Load BEFORE Monaco to avoid AMD conflicts) -->
  <script src="vendor/cytoscape/cytoscape.min.js"></script>
  <script src="vendor/layout-base/layout-base.js"></script>
  <script src="vendor/cose-base/cose-base.js"></script>
  <script src="vendor/cytoscape-fcose/cytoscape-fcose.js"></script>
  <script src="vendor/cytoscape-expand-collapse/cytoscape-expand-collapse.js"></script>

  <!-- Monaco AMD Loader (after Cytoscape) -->
  <script src="/lib/monaco/vs/loader.js"></script>

  <style>
    :root {
      --nv-status-bar-height: 22px;
    }

    /* Toolbar pinned to top */
    #global-toolbar {
      position: sticky;
      top: 0;
      z-index: 2000;
    }

    /* Keep the sub-toolbar under the main toolbar (and below dropdowns). */
    #sub-toolbar {
      position: sticky;
      top: var(--nv-global-toolbar-height, 40px);
      z-index: 1990;
    }

    /* Ensure workspace consumes remaining height */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* prevents body scroll; workspace should scroll instead */
      display: flex;
      flex-direction: column;
    }

    .hidden {
      display: none !important;
    }

    #login-screen {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, #0b7a43 0%, #064024 55%, #041e12 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(1rem + var(--nv-global-toolbar-height, 40px)) 1rem calc(1rem + var(--nv-status-bar-height, 22px)) 1rem;
      z-index: 3000;
      overflow: hidden;
    }

    #login-panorama {
      position: absolute;
      inset: var(--nv-global-toolbar-height, 40px) 0 var(--nv-status-bar-height, 22px) 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.75;
      z-index: 0;
      background-image: var(--nv-login-panorama-image, url('/ServerData/NotebookLoginBackground.svg'));
      background-repeat: repeat-x;
      background-position: 0 50%;
      background-size: auto 100%;
      will-change: background-position;
      animation: nv-login-panorama-bg 140s linear infinite;
      filter: saturate(1.05) contrast(1.05);
    }

    @keyframes nv-login-panorama-bg {
      from { background-position: 0 50%; }
      /* Arbitrary travel distance; repeat-x makes this seamless. */
      to { background-position: -2400px 50%; }
    }

    @media (prefers-reduced-motion: reduce) {
      #login-panorama {
        animation: none;
      }
    }

    .login-card {
      background: #0f0f12;
      border: 1px solid #444;
      border-radius: 16px;
      padding: 2rem;
      width: min(360px, 100%);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: relative;
      z-index: 1;
    }

    .login-card h1 {
      margin: 0;
      font-size: 1.6rem;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .login-card form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .login-card label {
      font-size: 0.9rem;
      letter-spacing: 0.01em;
    }

    .login-card input {
      width: 100%;
      padding: 0.65rem 0.75rem;
      margin-top: 0.35rem;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1e;
      color: #fff;
      font-size: 1rem;
    }

    .login-card button {
      padding: 0.75rem;
      border-radius: 9px;
      border: none;
      background: linear-gradient(135deg, #1e88e5, #64b5f6);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: filter 0.2s ease;
    }

    .login-card button:hover {
      filter: brightness(1.1);
    }

    #login-error {
      min-height: 1.25rem;
      font-size: 0.9rem;
      color: #ff6b6b;
      text-align: center;
    }

    @media (max-width: 600px) {
      .login-card {
        padding: 1.5rem;
      }
    }

    body.booting #login-screen,
    body.booting #app-shell {
      display: none !important;
    }
  </style>

</head>

<body class="booting">

  <div id="login-screen">
    <div id="login-panorama" aria-hidden="true">
    </div>
    <div class="login-card">
      <h1>Sign in to Nodevision</h1>
      <form id="login-form" action="/api/login" method="post">
        <label>
          Username
          <input type="text" name="username" autocomplete="username" required />
        </label>
        <label>
          Password
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Log in</button>
      </form>
      <p id="login-error" role="status" aria-live="polite"></p>
    </div>
  </div>

  <div id="app-shell" class="hidden">
    <!-- Top toolbar placeholder -->
    <div class="toolbar" id="global-toolbar"></div>
    <div id="sub-toolbar"></div>

    <!-- Workspace for panels -->
    <div id="workspace"></div>

    <!-- Status bar pinned to bottom -->
    <div id="status-bar">
      <span id="status-left">Ready</span>
      <span id="status-right"></span>
    </div>
  </div>

  <script type="module" src="./boot.mjs"></script>

</body>
</html>
